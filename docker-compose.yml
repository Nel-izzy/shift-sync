version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: shiftsync
      POSTGRES_PASSWORD: shiftsync
      POSTGRES_DB: shiftsync
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shiftsync']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://shiftsync:shiftsync@postgres:5432/shiftsync
      JWT_SECRET: ${JWT_SECRET:-shiftsync-super-secret-jwt-key-change-in-production}
      FRONTEND_URL: http://localhost:3000
      PORT: 4000
      NODE_ENV: production
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
        NEXT_PUBLIC_WS_URL: http://localhost:4000
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_WS_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  pgdata:
